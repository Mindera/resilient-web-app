server:
  port: 8080

spring:
  application:
    name: product-catalog-service

  # H2 Database (for distributed retry queue + ShedLock)
  datasource:
    url: jdbc:h2:mem:retrydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

# Pricing service connection
pricing-service:
  base-url: http://localhost:8081

# Distributed retry configuration
distributed-retry:
  interval-ms: 30000  # Run every 30 seconds

# Actuator - expose resilience4j endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,retries,circuitbreakers,circuitbreakerevents,retryevents,scheduledtasks
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      pricingService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
  retry:
    retryAspectOrder: 2
    instances:
      pricingService:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException.InternalServerError
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadGateway
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException.NotFound

logging:
  level:
    com.workshop.catalog: INFO
