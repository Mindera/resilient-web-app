services:

  pricing-service:
    build:
      context: ./pricing-service
    container_name: pricing-service
    ports:
      - "8081:8081"
    environment:
      FAILURE_DEFAULT_MODE: HEALTHY
      FAILURE_SLOW_DELAY_MS: 10000
      FAILURE_DEFAULT_RANDOM_RATE: 0
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - workshop-net

  product-catalog-service:
    build:
      context: ./product-catalog-service
    container_name: product-catalog-service
    ports:
      - "8080:8080"
    environment:
      PRICING_SERVICE_BASE_URL: http://pricing-service:8081
    depends_on:
      pricing-service:
        condition: service_healthy
    networks:
      - workshop-net

networks:
  workshop-net:
    driver: bridge
