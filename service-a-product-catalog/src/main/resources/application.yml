server:
  port: 8080

spring:
  application:
    name: service-a-product-catalog

# Pricing service connection
pricing-service:
  base-url: http://localhost:8081

# Actuator - expose resilience4j endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,retries,circuitbreakers,circuitbreakerevents,retryevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Resilience4j configuration
resilience4j:
  retry:
    instances:
      pricingService:
        maxAttempts: 3
        waitDuration: 500ms

logging:
  level:
    com.workshop.catalog: INFO
